<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Box</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

input{
    width:250px;
    padding:10px;
    margin:10px 0;
    font-size:16px;
}

button{
    padding:10px 20px;
    background:blue;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>Search Box</h2>

<form action="https://formsubmit.co/aswininagarajan6@gmail.com" method="POST">

<input type="text" name="Search" placeholder="Enter your search" required>

<input type="hidden" name="_captcha" value="false">

<button type="submit">Search</button>

</form>

</div>

</body>
</html>
