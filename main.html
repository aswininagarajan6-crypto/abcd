<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.L.N College of Engineering - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#3f2b96,#6a11cb);
}

.login-box{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:130px;
    margin-bottom:15px;
}

h2{
    color:#3f2b96;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:20px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    border:1px solid #3f2b96;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#3f2b96;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#28135f;
}

a{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#3f2b96;
    font-size:14px;
}
</style>

</head>
<body>

<div class="login-box">

    <img src="Screenshot 2026-07-13 111954.png" alt="KLN Logo" class="logo">

    <h2>K.L.N College of Engineering</h2>
    <p>Knowledge for Leadership and Nobility</p>

    <form>
        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <a href="#">Forgot Password?</a>
    </form>

</div>

</body>
</html>
